# HRMS Belarus: одна сеть (hrms-network), n8n + фронт (hrms-web).
# Supabase в контейнерах — через официальный Docker (см. docker/README.md): клонировать supabase/docker и запускать с docker/docker-compose.supabase-network.yml.

name: hrms-belarus

networks:
  hrms-network:
    driver: bridge

services:
  n8n-db:
    image: postgres:15-alpine
    container_name: hrms-n8n-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${N8N_DB_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:-n8n}
      POSTGRES_DB: ${N8N_DB_NAME:-n8n}
    volumes:
      - n8n-db-data:/var/lib/postgresql/data
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n} -d ${N8N_DB_NAME:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: hrms-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      NODE_ENV: production
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:-n8n}
      # Supabase: из контейнера n8n обращаться по имени сервиса (когда Supabase в той же сети)
      SUPABASE_URL: http://kong:8000
      SUPABASE_REST_URL: http://kong:8000/rest/v1
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      n8n-db:
        condition: service_healthy
    networks:
      - hrms-network

  hrms-web:
    build:
      context: ./hrms-web
      dockerfile: Dockerfile
    container_name: hrms-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_N8N_WEBHOOK_URL: http://localhost:5678
    depends_on:
      - n8n
    networks:
      - hrms-network

volumes:
  n8n-data:
  n8n-db-data:
